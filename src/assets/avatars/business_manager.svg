<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Comic/Retro style "Business Manager" Avatar -->
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="45" fill="#fdf4ff" stroke="#000" stroke-width="3"/>
  <!-- Smart-Casual Blouse -->
  <path d="M 20 100 Q 50 60 80 100 Z" fill="#8b5cf6" stroke="#000" stroke-width="3"/>
  <!-- Head -->
  <ellipse cx="50" cy="45" rx="15" ry="20" fill="#fed7aa" stroke="#000" stroke-width="3"/>
  <!-- Neat Bob Haircut -->
  <path d="M 30 55 Q 30 20 50 20 Q 70 20 70 55 Q 50 60 30 55 Z" fill="#000" stroke="#000" stroke-width="3"/>
  <!-- Stressed Eyes (Glasses) -->
  <rect x="35" y="40" width="10" height="8" rx="2" fill="none" stroke="#000" stroke-width="2"/>
  <rect x="55" y="40" width="10" height="8" rx="2" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M 45 44 L 55 44" stroke="#000" stroke-width="2"/>
  <circle cx="40" cy="44" r="2" fill="#000"/>
  <circle cx="60" cy="44" r="2" fill="#000"/>
  <!-- Straight Mouth -->
  <path d="M 45 55 L 55 55" stroke="#000" stroke-width="2"/>
  <!-- Clipboard/Tablet Hint -->
  <rect x="70" y="70" width="20" height="30" rx="2" fill="#d1d5db" stroke="#000" stroke-width="2"/>
</svg>
