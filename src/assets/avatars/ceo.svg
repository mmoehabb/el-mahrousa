<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Comic/Retro style "CEO/Founder" Avatar -->
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="45" fill="#f3f4f6" stroke="#000" stroke-width="3"/>
  <!-- Suit Jacket -->
  <path d="M 20 100 Q 50 60 80 100 Z" fill="#1e293b" stroke="#000" stroke-width="3"/>
  <!-- Shirt & Tie -->
  <polygon points="50,60 45,100 55,100" fill="#fff" stroke="#000" stroke-width="2"/>
  <polygon points="48,70 52,70 55,90 45,90" fill="#e11d48" stroke="#000" stroke-width="2"/>
  <!-- Head -->
  <rect x="35" y="30" width="30" height="35" rx="5" fill="#fdba74" stroke="#000" stroke-width="3"/>
  <!-- Slicked Back Hair -->
  <path d="M 33 30 Q 50 15 67 30 L 67 35 Q 50 20 33 35 Z" fill="#000" stroke="#000" stroke-width="3"/>
  <!-- Confident Eyes -->
  <path d="M 40 43 Q 43 40 46 43" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M 54 43 Q 57 40 60 43" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="43" cy="46" r="2" fill="#000"/>
  <circle cx="57" cy="46" r="2" fill="#000"/>
  <!-- Smug Smile -->
  <path d="M 42 55 Q 50 60 58 52" fill="none" stroke="#000" stroke-width="2"/>
</svg>
