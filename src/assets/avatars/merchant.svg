<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Comic/Retro style "Clever Merchant" Avatar -->
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="45" fill="#fef3c7" stroke="#000" stroke-width="3"/>
  <!-- Galabeya / Shirt -->
  <path d="M 20 100 Q 50 60 80 100 Z" fill="#06b6d4" stroke="#000" stroke-width="3"/>
  <!-- Head -->
  <rect x="35" y="30" width="30" height="35" rx="8" fill="#fca5a5" stroke="#000" stroke-width="3"/>
  <!-- Classic Tarboush (Fez) -->
  <polygon points="38,30 62,30 65,10 35,10" fill="#dc2626" stroke="#000" stroke-width="3"/>
  <!-- Tassel -->
  <path d="M 50 10 Q 60 5 70 20" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="70" cy="22" r="2" fill="#000"/>
  <!-- Eyes -->
  <circle cx="43" cy="45" r="3" fill="#000"/>
  <circle cx="57" cy="45" r="3" fill="#000"/>
  <!-- Shrewd Mustache -->
  <path d="M 40 55 Q 50 50 60 55" fill="none" stroke="#000" stroke-width="3"/>
</svg>
