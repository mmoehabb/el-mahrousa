<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Comic/Retro style "Trendy Youth" Avatar -->
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="45" fill="#e0f2fe" stroke="#000" stroke-width="3"/>
  <!-- Oversized Hoodie -->
  <path d="M 20 100 Q 50 60 80 100 Z" fill="#fb923c" stroke="#000" stroke-width="3"/>
  <!-- Head -->
  <rect x="35" y="30" width="30" height="35" rx="10" fill="#fed7aa" stroke="#000" stroke-width="3"/>
  <!-- Trendy Haircut (Fade/curly top) -->
  <path d="M 32 30 Q 50 -10 68 30" fill="#1c1917" stroke="#000" stroke-width="3"/>
  <!-- AirPods -->
  <rect x="30" y="45" width="5" height="10" rx="2" fill="#fff" stroke="#000" stroke-width="2"/>
  <rect x="65" y="45" width="5" height="10" rx="2" fill="#fff" stroke="#000" stroke-width="2"/>
  <!-- Eyes -->
  <circle cx="43" cy="45" r="3" fill="#000"/>
  <circle cx="57" cy="45" r="3" fill="#000"/>
  <!-- Smirk -->
  <path d="M 45 55 Q 50 58 55 53" fill="none" stroke="#000" stroke-width="2"/>
  <!-- Coffee Cup Outline in Hand -->
  <rect x="25" y="80" width="15" height="20" fill="#fff" stroke="#000" stroke-width="2"/>
  <path d="M 25 85 L 40 85" stroke="#000" stroke-width="2"/>
</svg>
