<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Comic/Retro style "Rich Aunt" Avatar -->
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="45" fill="#fce7f3" stroke="#000" stroke-width="3"/>
  <!-- Blouse -->
  <path d="M 20 100 Q 50 60 80 100 Z" fill="#ec4899" stroke="#000" stroke-width="3"/>
  <!-- Hair (Big retro hair) -->
  <path d="M 25 50 Q 50 10 75 50 Q 80 70 70 80 Q 50 90 30 80 Q 20 70 25 50 Z" fill="#451a03" stroke="#000" stroke-width="3"/>
  <!-- Head -->
  <ellipse cx="50" cy="45" rx="15" ry="20" fill="#fed7aa" stroke="#000" stroke-width="3"/>
  <!-- Oversized Sunglasses -->
  <rect x="30" y="35" width="18" height="12" rx="3" fill="#000"/>
  <rect x="52" y="35" width="18" height="12" rx="3" fill="#000"/>
  <path d="M 48 40 L 52 40" stroke="#000" stroke-width="2"/>
  <!-- Gold Necklace (Accent) -->
  <path d="M 40 70 Q 50 85 60 70" fill="none" stroke="#fbbf24" stroke-width="4"/>
  <!-- Lips -->
  <path d="M 45 55 Q 50 58 55 55" fill="none" stroke="#be123c" stroke-width="3"/>
</svg>
