<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Comic/Retro style "Project Manager" Avatar -->
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="45" fill="#ecfdf5" stroke="#000" stroke-width="3"/>
  <!-- Casual Shirt -->
  <path d="M 20 100 Q 50 60 80 100 Z" fill="#10b981" stroke="#000" stroke-width="3"/>
  <!-- Head -->
  <rect x="35" y="30" width="30" height="35" rx="8" fill="#fdba74" stroke="#000" stroke-width="3"/>
  <!-- Messy Hair (Stressed) -->
  <path d="M 32 30 Q 40 10 50 25 Q 60 10 68 30" fill="none" stroke="#451a03" stroke-width="4"/>
  <!-- Tired Eyes -->
  <path d="M 40 46 Q 43 43 46 46" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M 54 46 Q 57 43 60 46" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="43" cy="48" r="1.5" fill="#000"/>
  <circle cx="57" cy="48" r="1.5" fill="#000"/>
  <!-- Eye Bags -->
  <path d="M 38 52 Q 43 55 48 52" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <path d="M 52 52 Q 57 55 62 52" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Open Mouth (Yelling about deadlines) -->
  <ellipse cx="50" cy="60" rx="4" ry="6" fill="#000"/>
  <!-- Big Coffee Mug Hint -->
  <rect x="15" y="75" width="20" height="25" rx="2" fill="#ef4444" stroke="#000" stroke-width="2"/>
  <path d="M 15 80 Q 5 85 15 90" fill="none" stroke="#000" stroke-width="2"/>
</svg>
