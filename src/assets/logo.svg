<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <clipPath id="squircle">
      <rect width="512" height="512" rx="112" ry="112" />
    </clipPath>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1034A6"/>
      <stop offset="100%" stop-color="#1A4A9C"/>
    </linearGradient>
  </defs>
  <g clip-path="url(#squircle)">
    <!-- Sky background -->
    <rect width="512" height="512" fill="url(#sky)" />
    <!-- Sun -->
    <circle cx="256" cy="256" r="140" fill="#E0115F" />
    <!-- Pyramid Left -->
    <polygon points="60,400 256,160 452,400" fill="#D4AF37" />
    <!-- Pyramid Right (Shadow) -->
    <polygon points="256,160 452,400 256,400" fill="#B3932D" />
    <!-- Sand Base -->
    <rect x="0" y="400" width="512" height="112" fill="#F4A460" />

    <!-- Dice -->
    <!-- Die 1 -->
    <g transform="translate(180, 310) rotate(-15)">
      <rect width="80" height="80" rx="16" fill="#fff" />
      <circle cx="24" cy="24" r="8" fill="#1034A6" />
      <circle cx="56" cy="56" r="8" fill="#1034A6" />
    </g>
    <!-- Die 2 -->
    <g transform="translate(260, 330) rotate(10)">
      <rect width="80" height="80" rx="16" fill="#fff" />
      <circle cx="24" cy="24" r="8" fill="#E0115F" />
      <circle cx="40" cy="40" r="8" fill="#E0115F" />
      <circle cx="56" cy="56" r="8" fill="#E0115F" />
    </g>
  </g>
</svg>
